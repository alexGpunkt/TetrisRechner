<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tetris Summen - Mit Entdeckungs-Info</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: #0a1a24;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: center;
            background: radial-gradient(circle at 50% 50%, #1d3a4a, #0b1e2b);
            touch-action: none;
            padding: 0;
            margin: 0;
        }

        .logo-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 60px;
            height: 60px;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEEAAAAPCAYAAAC7paJZAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAZdEVYdFNvZnR3YXJlAFBhaW50Lk5FVCA1LjEuMTGKCBbOAAAAuGVYSWZJSSoACAAAAAUAGgEFAAEAAABKAAAAGwEFAAEAAABSAAAAKAEDAAEAAAACAAAAMQECABEAAABaAAAAaYcEAAEAAABsAAAAAAAAAGAAAAABAAAAYAAAAAEAAABQYWludC5ORVQgNS4xLjExAAADAACQBwAEAAAAMDIzMAGgAwABAAAAAQAAAAWgBAABAAAAlgAAAAAAAAACAAEAAgAEAAAAUjk4AAIABwAEAAAAMDEwMAAAAAAGNdRzso9yOwAAAv5JREFUWEft11uIlVUUwPFfiXbXogsykpUjoVJ0QZTShyIJuhiIwQxUUFJhFElkF4gwX4KgvEFIF6kIX3xQ1CLSGhGTMSpSLK2oJumCKJUySBcqe1m7FptvTo7nPPaHzd5r7fV9e5+117fXOvyPE9K4CwtwLc7EO9HWxvxzmJrsn8XCJN+ClRgX8kHcmuYLN8YaV2ISvsY2vI69le3jmIUp+Bj9eB4/oxf3Jdub8GaSV6A79IX74/nCAuxMsp042tCWx/zLSXcAsyu7MdiS5P788uCxNP8IHg1H9uEbTE62LzTs5SgG4vB6K/3plTwXT1S6Syr5cjgxFrwOl8X4Fyz+dy8exMgkHy8L42R7cT5+x1ZsxhK8j7dwEc7GvenZu8JJcCHmpLm2KU64NOn2Y1mS4eJKHi7n4Ck8gEF8G07ZgVewEbdFhN0R4Z9Zh++T3J3GbVOc8F+U7zwznI08HD90NVbhw4iG+bgCR/AHNkRUjqhfgJPT+Kw0LpRIbkX+3P5hKCcciu+utE3V/LlYWulaMRkfYR7Gpsvp1ei3Rr87wr2JLvwVrauexHu1ooE1tUILJ2zAb6ndUBsMk0n4Kp3WruhLNO2IfnxklSa6IkJG4M56sh2GcgKMSq3mT+yplS0o64yPvjhhQvSfRj8NX8S4Ju+naU/Hsp9Gm6GcML9WVPwUN/2xshcTI7+LdCYyBXyCm3F7pOImBlJk5uxVmF4rGuipFVo44YdYrFN8hhmpmFmOJyMjFHl9ZKW+5KzMQBofSuO2KU44kHTjcCpOSrrjYQJejEvw5Tip0/BQpMBpUQ1uD/u7sQij4xAyY3BKknO6bJvihI1JN6pDnj4P9+BqHI664LX4kdOj4nwXM+Oimxp2PXE5vpHe9XmU2fBrlPMdozhhENdHLyrEZ5JdJ1gdNcBs/Ii3o77vj5PtxgV4Kex7Ul1faoTdod8fckfIf6AK12Bf9Q3CGZU8WOlqOVOcW5gZ0TAFX8bJflDZFEbjqsgg31VzrdYva9a6WvY3+rC22ujaWpIAAAAASUVORK5CYII=');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.2;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 0 5px rgba(243, 156, 18, 0.2));
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            max-height: none;
            display: grid;
            grid-template-rows: auto 1fr auto;
            position: relative;
            margin: 0 auto;
            z-index: 10;
            background: rgba(10, 26, 36, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-left: 1px solid rgba(243, 156, 18, 0.15);
            border-right: 1px solid rgba(243, 156, 18, 0.15);
            overflow: hidden;
        }

        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            z-index: 20;
            min-height: 64px;
            flex-shrink: 0;
            background: rgba(10, 26, 36, 0.6);
            border-bottom: 1px solid rgba(243, 156, 18, 0.2);
        }

        .hamburger-btn {
            width: 48px;
            height: 48px;
            background: rgba(30, 74, 90, 0.95);
            border: 2px solid #4fa3c9;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0d3645;
            transition: all 0.1s ease;
            flex-shrink: 0;
        }

        .hamburger-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d3645;
        }

        .hamburger-btn span {
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
        }

        .hamburger-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .hamburger-btn.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        /* Anzeige-Bereich (Historie oder Entdeckungstipp) */
        .display-area {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(7, 54, 66, 0.9);
            border-radius: 30px;
            padding: 5px 12px;
            border: 2px solid #f39c12;
            height: 48px;
            margin-left: 8px;
            transition: all 0.3s ease;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .display-area.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .history-items {
            display: flex;
            align-items: center;
            gap: 5px;
            width: 100%;
        }

        .history-items.hidden {
            display: none;
        }

        .history-top-item {
            background: rgba(38, 96, 119, 0.95);
            border-radius: 20px;
            padding: 5px 6px;
            color: #f7e05e;
            font-weight: 700;
            font-size: 0.95rem;
            border-left: 3px solid #f39c12;
            box-shadow: 0 2px 0 #0d303e;
            flex: 1;
            text-align: center;
            min-width: 35px;
            white-space: nowrap;
        }

        .history-top-item.empty {
            background: rgba(38, 96, 119, 0.4);
            color: #a0d0f0;
            border-left: 3px solid #4fa3c9;
        }

        .history-top-label {
            color: #f39c12;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .discovery-tip {
            color: #ffd966;
            font-size: 0.9rem;
            font-weight: 500;
            width: 100%;
            text-align: left;
            animation: pulse 2s infinite;
        }

        .discovery-tip.hidden {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .sum-display-header {
            background: rgba(7, 54, 66, 0.95);
            border: 2px solid #f39c12;
            border-radius: 30px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #05262e;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            height: 50px;
            position: absolute;
            top: 74px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
        }

        .sum-display-header.hidden {
            opacity: 0;
            transform: translateX(-50%) scale(0.9);
            pointer-events: none;
        }

        .sum-display-header .sum-label {
            color: #f39c12;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .sum-display-header .sum-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f7e05e;
            min-width: 50px;
            text-align: right;
            text-shadow: 0 2px 0 #a7580e;
        }

        .grid-wrapper {
            min-height: 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: rgba(13, 44, 59, 0.85);
            padding: 6px 10px;
            margin: 0;
            border-top: 2px solid rgba(57, 142, 173, 0.5);
            border-bottom: 2px solid rgba(57, 142, 173, 0.5);
            overflow: hidden;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            width: min(100%, calc(100dvh - 170px - env(safe-area-inset-bottom)));
            max-width: 450px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            align-self: start;
        }

        .grid-cell {
            background: rgba(31, 78, 98, 0.95);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 2.5vw, 1.3rem);
            font-weight: 700;
            color: #eef9ff;
            box-shadow: 0 -1px 0 #0d303e, 0 1px 3px black;
            border: 1px solid #60b5d6;
            touch-action: none;
            transition: all 0.1s ease;
            cursor: pointer;
            text-shadow: 0 1px 1px black;
        }

        .grid-cell.active {
            background: radial-gradient(circle at 30% 30%, #ffe28a, #e67e22);
            color: #111;
            box-shadow: 0 0 12px #f39c12, 0 -1px 0 #b8570e;
            border-color: white;
            transform: scale(1.02);
            text-shadow: none;
        }

        .mobile-footer {
            min-height: 72px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 15px calc(8px + env(safe-area-inset-bottom));
            gap: 12px;
            z-index: 20;
            background: rgba(10, 26, 36, 0.78);
            border-top: 1px solid rgba(243, 156, 18, 0.2);
        }

        .action-button {
            flex: 1;
            height: 54px;
            background: rgba(38, 100, 139, 0.95);
            border: 2px solid #f39c12;
            border-radius: 30px;
            padding: 0 10px;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 5px 0 #0f3b55;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.1s ease;
        }

        .action-button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f3b55;
        }

        .action-button.rotate {
            background: rgba(42, 95, 122, 0.95);
            box-shadow: 0 5px 0 #1a3f52;
        }

        .action-button span {
            font-size: 1.5rem;
        }

        /* Radio-Gruppe im Menü */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 5px 0;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            width: 22px;
            height: 22px;
            accent-color: #f39c12;
            cursor: pointer;
            margin-right: 5px;
        }

        .radio-item label {
            flex: 1;
            cursor: pointer;
            color: #e0f0ff;
        }

        .difficulty-selector {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #4fa3c9;
        }

        .difficulty-title {
            color: #f39c12;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .difficulty-buttons {
            display: flex;
            gap: 8px;
        }

        .difficulty-btn {
            flex: 1;
            background: #1e4a5a;
            border: 1px solid #4fa3c9;
            border-radius: 20px;
            padding: 8px 0;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
        }

        .difficulty-btn.active {
            background: #f39c12;
            color: #111;
            border-color: #f39c12;
        }

        .difficulty-btn:active {
            transform: scale(0.95);
        }

        .difficulty-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Info-Button für Entdeckungen */
        .info-btn {
            background: #f39c12;
            border: none;
            border-bottom: 3px solid #b36b0e;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            color: #0a1a24;
            box-shadow: 0 3px 0 #b36b0e;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .info-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b36b0e;
        }

        .info-btn svg {
            width: 20px;
            height: 20px;
            fill: #0a1a24;
        }

        /* Entdeckungen-Panel (für Info-Button) */
        .discoveries-panel {
            position: absolute;
            top: 80px;
            left: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid #f39c12;
            border-radius: 25px;
            padding: 16px;
            color: white;
            z-index: 1200;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            transition: all 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
        }

        .discoveries-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
        }

        .discoveries-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
        }

        .discoveries-header h3 {
            font-size: 1.2rem;
            color: #f39c12;
            flex: 1;
        }

        .discoveries-close {
            width: 36px;
            height: 36px;
            background: #ff6b6b;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #b33f3f;
        }

        .discoveries-close:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .discoveries-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .discovery-section {
            background: #1a3e4e;
            border-radius: 16px;
            padding: 15px;
            border-left: 6px solid #f39c12;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .discovery-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f39c12;
            margin-bottom: 10px;
        }

        .discovery-section-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #e0f0ff;
            margin-bottom: 10px;
        }

        .discovery-section-example {
            background: #0f2a33;
            border-radius: 12px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            border: 1px solid #5fa3c0;
            color: #b3e5fc;
            white-space: pre-wrap;
        }

        .discovery-section-tip {
            background: #f39c1220;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.9rem;
            border-left: 4px solid #f39c12;
            color: #ffd966;
            margin-top: 8px;
        }

        .discovery-section-level {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
        }

        .level-basis {
            background: #27ae60;
            color: white;
        }

        .level-mittel {
            background: #e67e22;
            color: white;
        }

        .level-stark {
            background: #c0392b;
            color: white;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .hamburger-menu {
            position: absolute;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background: linear-gradient(145deg, #1f4454, #12303e);
            border-radius: 0 25px 25px 0;
            padding: 80px 15px 20px;
            z-index: 950;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #4fa3c9;
            border-left: none;
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
        }

        .hamburger-menu.active {
            left: 0;
            opacity: 1;
            pointer-events: auto;
        }

        .menu-section {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #5fa3c0;
        }

        .menu-title {
            color: #f39c12;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .dropdown {
            width: 100%;
            background: #1e4a5a;
            border: 2px solid #4fa3c9;
            border-radius: 25px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: white;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2380deea' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #0d3645;
        }

        .qr-btn {
            background: #2a5f7a;
            border: none;
            border-bottom: 3px solid #1a3f52;
            padding: 12px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 3px 0 #1a3f52;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #f39c12;
        }

        .qr-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a3f52;
        }

        .qr-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .qr-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .qr-overlay.active {
            display: flex;
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 90%;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        #qrCanvas {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        .qr-title {
            color: #333;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .qr-url {
            color: #f39c12;
            font-size: 0.8rem;
            font-weight: 600;
            word-break: break-all;
            text-align: center;
            background: #f0f0f0;
            padding: 6px 12px;
            border-radius: 25px;
        }

        .qr-close-btn {
            background: #26648b;
            border: none;
            border-bottom: 3px solid #0f3b55;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 3px 0 #083349;
            cursor: pointer;
            width: 100%;
        }

        .qr-close-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #083349;
        }

        @media (max-height: 700px) {
            .mobile-header {
                min-height: 58px;
                padding: 6px 10px;
            }

            .hamburger-btn {
                width: 42px;
                height: 42px;
            }

            .display-area {
                height: 42px;
            }

            .grid-wrapper {
                padding: 4px 8px;
            }

            .mobile-footer {

                }
            }

            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMenu();
            });

            menuOverlay.addEventListener('click', () => {
                toggleMenu(false);
            });

            function updateTopHistory() {
                const lastThree = historySums.slice(-3).reverse();
                const topElements = [historyTop1, historyTop2, historyTop3];

                for (let i = 0; i < 3; i++) {
                    if (i < lastThree.length) {
                        topElements[i].textContent = lastThree[i];
                        topElements[i].classList.remove('empty');
                    } else {
                        topElements[i].textContent = '-';
                        topElements[i].classList.add('empty');
                    }
                }
            }

            showSumBtn.addEventListener('click', () => {
                const sum = calculateSum();
                sumValueSpan.textContent = sum;
                sumDisplay.classList.remove('hidden');
                sumVisible = true;
                addHistoryEntry(sum);

                setTimeout(() => {
                    if (sumVisible) {
                        sumDisplay.classList.add('hidden');
                        sumVisible = false;
                    }
                }, 4000);
            });

            rotateBtn.addEventListener('click', () => {
                rotateFigure();
            });

            function rotateFigure() {
                const newRotation = (currentRotation + 1) % 4;
                const offsets = figures[currentFigure][newRotation];
                const allInside = offsets.every(([dr, dc]) => {
                    const r = figurePos.row + dr;
                    const c = figurePos.col + dc;
                    return r >= 0 && r < rows && c >= 0 && c < cols;
                });

                if (allInside) {
                    currentRotation = newRotation;
                    renderGrid();

                    const activeCells = document.querySelectorAll('.grid-cell.active');
                    activeCells.forEach(cell => {
                        cell.style.transform = 'scale(1.1)';
                        setTimeout(() => {
                            cell.style.transform = '';
                        }, 200);
                    });
                }
            }

            function renderGrid() {
                gridContainer.innerHTML = '';
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.textContent = grid[r][c];

                        const figureCells = getFigureCells(currentFigure, figurePos.row, figurePos.col, currentRotation);
                        if (figureCells.some(cellPos => cellPos.row === r && cellPos.col === c)) {
                            cell.classList.add('active');
                        }

                        cell.addEventListener('click', handleCellClick);
                        gridContainer.appendChild(cell);
                    }
                }
                
                if (currentDisplayMode === 'discoveries') {
                    updateDiscoveryTip();
                }
            }

            function handleCellClick(e) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;

                const isActiveCell = e.target.classList.contains('active');

                if (tapLength < 300 && tapLength > 0 && lastTapTarget === e.target && isActiveCell) {
                    const sum = calculateSum();
                    alert(`🎯 Aktuelle Summe: ${sum}`);
                    addHistoryEntry(sum);

                    e.target.style.transform = 'scale(1.15)';
                    e.target.style.backgroundColor = '#f1c40f';
                    setTimeout(() => {
                        e.target.style.transform = '';
                        e.target.style.backgroundColor = '';
                    }, 200);

                    lastTapTime = 0;
                    lastTapTarget = null;
                } else {
                    lastTapTime = currentTime;
                    lastTapTarget = e.target;
                }
            }

            function getFigureCells(figType, r0, c0, rot = 0) {
                const offsets = figures[figType][rot] || figures[figType][0];
                return offsets.map(([dr, dc]) => ({
                    row: r0 + dr,
                    col: c0 + dc
                })).filter(cell => cell.row >= 0 && cell.row < rows && cell.col >= 0 && cell.col < cols);
            }

            function calculateSum() {
                const cells = getFigureCells(currentFigure, figurePos.row, figurePos.col, currentRotation);
                return cells.reduce((acc, {row, col}) => acc + grid[row][col], 0);
            }

            function moveFigure(dr, dc) {
                const newRow = figurePos.row + dr;
                const newCol = figurePos.col + dc;
                const offsets = figures[currentFigure][currentRotation];
                const anyInside = offsets.some(([drr, dcc]) => {
                    const r = newRow + drr;
                    const c = newCol + dcc;
                    return r >= 0 && r < rows && c >= 0 && c < cols;
                });

                if (anyInside) {
                    figurePos.row = newRow;
                    figurePos.col = newCol;
                    renderGrid();

                    if (sumVisible) {
                        sumDisplay.classList.add('hidden');
                        sumVisible = false;
                    }
                }
            }

            function addHistoryEntry(sum) {
                historySums.push(sum);
                if (historySums.length > 15) historySums.shift();
                
                if (currentDisplayMode === 'history') {
                    updateTopHistory();
                }
            }

            figureSelect.addEventListener('change', (e) => {
                currentFigure = e.target.value;
                currentRotation = 0;
                
                setDifficulty('easy');
                
                renderGrid();
                
                if (currentDisplayMode === 'discoveries') {
                    updateDiscoveryTip();
                }
                
                setTimeout(() => toggleMenu(false), 300);
            });

            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key.startsWith('Arrow')) {
                    e.preventDefault();
                    switch (key) {
                        case 'ArrowUp': moveFigure(-1, 0); break;
                        case 'ArrowDown': moveFigure(1, 0); break;
                        case 'ArrowLeft': moveFigure(0, -1); break;
                        case 'ArrowRight': moveFigure(0, 1); break;
                    }
                } else if (key === 'r' || key === 'R') {
                    e.preventDefault();
                    rotateFigure();
                }
            });

            let touchStart = null;
            gridContainer.addEventListener('touchstart', (e) => {
                touchStart = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }, { passive: false });

            gridContainer.addEventListener('touchend', (e) => {
                if (!touchStart) return;
                const dx = e.changedTouches[0].clientX - touchStart.x;
                const dy = e.changedTouches[0].clientY - touchStart.y;
                const minDist = 25;

                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minDist) {
                    if (dx > 0) moveFigure(0, 1);
                    else moveFigure(0, -1);
                } else if (Math.abs(dy) > minDist) {
                    if (dy > 0) moveFigure(1, 0);
                    else moveFigure(-1, 0);
                }
                touchStart = null;
                e.preventDefault();
            }, { passive: false });

            // Initialisierung
            modeNone.checked = true;
            currentDisplayMode = 'none';
            displayArea.classList.add('hidden');
            difficultySelector.classList.add('hidden');
            
            renderGrid();
            updateTopHistory();
        })();
    </script>
</body>
</html>
